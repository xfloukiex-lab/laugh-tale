<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Original art. Generic treasure chest; evokes "the final treasure" without copying any official design or logo. -->
  <rect width="128" height="128" rx="24" fill="#23170a"/>
  <!-- glow -->
  <circle cx="64" cy="62" r="34" fill="#f4c34a" opacity="0.14"/>
  <!-- chest base -->
  <rect x="30" y="62" width="68" height="38" rx="6" fill="#7a4a23" stroke="#5b371a" stroke-width="3"/>
  <!-- lid -->
  <path d="M30 62 v-8 a6 6 0 0 1 6-6 h56 a6 6 0 0 1 6 6 v8 z" fill="#8a5528" stroke="#5b371a" stroke-width="3"/>
  <!-- bands + lock -->
  <rect x="44" y="48" width="8" height="52" fill="#caa033"/>
  <rect x="76" y="48" width="8" height="52" fill="#caa033"/>
  <rect x="58" y="68" width="12" height="12" rx="2" fill="#f4c34a" stroke="#5b371a" stroke-width="2"/>
  <!-- spark -->
  <g fill="#ffe9a8">
    <path d="M64 20 l3 8 l8 3 l-8 3 l-3 8 l-3 -8 l-8 -3 l8 -3 z"/>
    <circle cx="92" cy="34" r="3"/>
    <circle cx="36" cy="34" r="2.5"/>
  </g>
</svg>
